---
- name: Set override_values.yaml path
  ansible.builtin.set_fact:
    ingress_helm_override_values_path: "{{ tmp_dir }}/{{ ingress.helm.chart_name }}-override-values.yaml"
  tags:
    - install
    - pre-upgrade

- name: Ensure Helm repository is added
  kubernetes.core.helm_repository:
    name: "{{ ingress.helm.repo_name }}"
    repo_url: "{{ ingress.helm.repo_url }}"
    state: present
  tags:
    - install
    - pre-upgrade

- name: Build Helm chart dependencies
  ansible.builtin.command:
    cmd: helm dependency build
    chdir: "{{ ingress.helm.chart_directory }}"
  register: helm_dependency_build_result
  until: helm_dependency_build_result is succeeded
  retries: 5
  delay: 15
  tags:
    - install
    - pre-upgrade

- name: Generate override values file from template
  ansible.builtin.template:
    src: "values.yaml.j2"
    dest: "{{ ingress_helm_override_values_path }}"
    mode: '0644'
  tags:
    - install
    - pre-upgrade

- name: Set values_files list
  ansible.builtin.set_fact:
    values_files: >
      {{
        [ingress.helm.default_values_file] +
        [ingress_helm_override_values_path]
      }}
  tags:
    - install
    - pre-upgrade

- name: Ensure namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ingress.namespace }}"
  tags:
    - install

- name: Enforce PSS
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ingress.namespace }}"
        labels:
          pod-security.kubernetes.io/enforce: "privileged"
  when: enforcePSS
  tags:
    - install

- name: Run pre-upgrade checks
  ansible.builtin.include_role:
    name: upgrade
  vars:
    release_namespace: "{{ ingress.namespace }}"
    release_name: "{{ ingress.helm.release_name }}"
    release_enabled: "{{ ingress.enabled }}"
    chart_ref: "{{ ingress.helm.chart_directory }}"
    release_values_files: "{{ values_files }}"
  tags:
    - pre-upgrade

- name: Install or Upgrade Helm chart
  kubernetes.core.helm:
    name: "{{ ingress.helm.release_name }}"
    chart_ref: "{{ ingress.helm.chart_directory }}"
    namespace: "{{ ingress.namespace }}"
    values_files: "{{ values_files }}"
    state: present
    create_namespace: true
    wait: true
    timeout: "{{ helm_timeout }}"
#   This is a method to use a post-renderer script to modify the rendered manifests before they are applied to the cluster.
#   Commented due to lack of port forwarding enabled in kata
#    post_renderer:
#      "{{ tdx_post_renderer_executable ~ ' --post-renderer-args \"' ~ ingress.namespace ~ ' ' ~ KBS_ADDRESS ~ '\"'
#       if tdx.coco.enabled else omit }}"
  register: helm_repo_install_result
  until: helm_repo_install_result is succeeded
  retries: 5
  delay: 15
  tags:
    - install

- name: Create Endpoints for external storage backend
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Endpoints
      metadata:
        name: external-backend
        namespace: default
      subsets:
        - addresses:
            - ip: "{{ ontap_data_lif }}"
          ports:
            - name: https
              port: 443
              protocol: TCP
  when: reverse_proxy_storage | default(false) | bool
  tags:
    - install

- name: Create Service for external storage backend
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: external-backend
        namespace: default
      spec:
        type: ClusterIP
        ports:
          - name: https
            port: 443
            targetPort: 443
        selector: {}
  when: reverse_proxy_storage | default(false) | bool
  tags:
    - install

- name: Create TLS secret for external storage backend ingress
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: tls-secret
        namespace: default
      data:
        tls.crt: "{{ lookup('file', pathToCert) | b64encode }}"
        tls.key: "{{ lookup('file', pathToKey) | b64encode }}"
      type: kubernetes.io/tls
  when: reverse_proxy_storage | default(false) | bool
  tags:
    - install

- name: Create Ingress for external storage backend
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: external-backend-ing
        namespace: default
        annotations:
          nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
          nginx.ingress.kubernetes.io/proxy-intercept-errors: "false"
          nginx.ingress.kubernetes.io/proxy-ssl-name: "s3.{{ FQDN }}"
          nginx.ingress.kubernetes.io/proxy-ssl-verify: "false"
          nginx.ingress.kubernetes.io/ssl-passthrough: "true"
          nginx.ingress.kubernetes.io/upstream-vhost: "s3.{{ FQDN }}"
      spec:
        ingressClassName: nginx
        rules:
          - host: "s3.{{ FQDN }}"
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: external-backend
                      port:
                        number: 443
        tls:
          - hosts:
              - "s3.{{ FQDN }}"
            secretName: tls-secret
  when: reverse_proxy_storage | default(false) | bool
  tags:
    - install

- name: Uninstall Helm chart
  kubernetes.core.helm:
    name: "{{ ingress.helm.release_name }}"
    namespace: "{{ ingress.namespace }}"
    state: absent
  tags:
    - uninstall

- name: Remove reverse proxy storage resources
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: "{{ item.apiVersion }}"
      kind: "{{ item.kind }}"
      metadata:
        name: "{{ item.name }}"
        namespace: default
  loop:
    - { apiVersion: "networking.k8s.io/v1", kind: Ingress, name: external-backend-ing }
    - { apiVersion: v1, kind: Service, name: external-backend }
    - { apiVersion: v1, kind: Endpoints, name: external-backend }
    - { apiVersion: v1, kind: Secret, name: tls-secret }
  when: reverse_proxy_storage | default(false) | bool
  tags:
    - uninstall

- name: Remove namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ingress.namespace }}"
    state: absent
  tags:
    - uninstall
