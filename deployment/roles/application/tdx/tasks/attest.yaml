---
- name: Create namespace TDX
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: tdx
    state: present
  tags:
    - install

- name: Install NRI device injector
  ansible.builtin.include_tasks:
    file: manage_nri_device_injector.yaml
  tags:
    - install

- name: Deploy attestation pod
  kubernetes.core.k8s:
    state: present
    template: attest.yaml.j2
  tags:
    - install

- name: Wait for pod completion
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: tdx
    name: tdx-attestation
  register: tdx_attestation_pod_status
  until: tdx_attestation_pod_status.resources[0].status.phase in ['Succeeded', 'Failed']
  retries: 6
  delay: 5
  tags:
    - install

- name: Get attestation logs
  kubernetes.core.k8s_log:
    namespace: tdx
    name: tdx-attestation
  register: tdx_attestation_logs
  tags:
    - install

- name: Switch tdx attestation status variable state
  ansible.builtin.fail:
    msg: TDX Attestation has failed.
  tags:
    - install
  when: '"ATTESTATION COMPLETED SUCCESSFULLY" not in tdx_attestation_logs.log'

- name: Delete attestation pod
  vars:
    KBS_ADDRESS: ""  # content of the variable does not matter for uninstallation
  kubernetes.core.k8s:
    state: absent
    template: attest.yaml.j2
  tags:
    - uninstall

- name: Uninstall NRI device injector
  ansible.builtin.include_tasks:
    file: manage_nri_device_injector.yaml
  tags:
    - uninstall
