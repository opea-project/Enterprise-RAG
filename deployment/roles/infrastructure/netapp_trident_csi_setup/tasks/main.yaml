# TEST ONTAP BACKEND CONNECTIVITY BEFORE INSTALLATION
- name: Test ONTAP backend connectivity from worker nodes
  ansible.builtin.include_tasks: test_connectivity.yaml
  tags:
    - install
    - post-install

# INSTALL TASKS
- name: Create Trident namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ trident_namespace }}"
    state: present
  tags:
    - install
    - post-install

- name: Add Trident Helm repo
  kubernetes.core.helm_repository:
    name: netapp-trident
    repo_url: https://netapp.github.io/trident-helm-chart/
  tags:
    - install
    - post-install

- name: Install Trident operator via Helm
  kubernetes.core.helm:
    name: trident-operator
    chart_ref: netapp-trident/trident-operator
    release_namespace: "{{ trident_namespace }}"
    create_namespace: true
    chart_version: "100.{{ trident_operator_version }}"
    update_repo_cache: true
    wait: true
  tags:
    - install
    - post-install

- name: Wait for Trident CRDs to be registered by the operator
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: tridentbackendconfigs.trident.netapp.io
  register: trident_crd_check
  until:
    - trident_crd_check.resources | length > 0
    - trident_crd_check.resources[0].status.conditions |
      selectattr('type', 'equalto', 'Established') |
      selectattr('status', 'equalto', 'True') | list | length > 0
  retries: 30
  delay: 10
  tags:
    - install
    - post-install

- name: Create Trident ONTAP credentials secret
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'trident-secret.yaml.j2') }}"
  tags:
    - install
    - post-install

- name: Create Trident backend for ONTAP NAS
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'trident-backend.yaml.j2') | from_yaml }}"
  tags:
    - install
    - post-install

- name: Check if Trident backend exists and is bound
  kubernetes.core.k8s_info:
    api_version: trident.netapp.io/v1
    kind: TridentBackendConfig
    name: "{{ trident_backend_name }}"
    namespace: "{{ trident_namespace }}"
  register: backend_check
  until:
    - backend_check.resources | length > 0
    - backend_check.resources[0].status.phase is defined
    - backend_check.resources[0].status.phase == 'Bound'
  retries: 12
  delay: 10
  tags:
    - install
    - post-install

- name: Display Trident backend status
  ansible.builtin.debug:
    msg: |
      Trident Backend Status:
      Name: {{ trident_backend_name }}
      Namespace: {{ trident_namespace }}
      {% if backend_check.resources | length > 0 %}
      Phase: {{ backend_check.resources[0].status.phase | default('Unknown') }}
      Backend Name: {{ backend_check.resources[0].status.backendInfo.backendName | default('N/A') }}
      Backend UUID: {{ backend_check.resources[0].status.backendInfo.backendUUID | default('N/A') }}
      Status: {% if backend_check.resources[0].status.phase == 'Bound' %}SUCCESS - Backend is bound and ready{% else %}WARNING - Backend phase is {{ backend_check.resources[0].status.phase }}{% endif %}
      {% else %}
      Status: FAILED - Backend object does not exist
      {% endif %}
  tags:
    - install
    - post-install

- name: Fail if backend object does not exist
  ansible.builtin.fail:
    msg: "Trident backend {{ trident_backend_name }} does not exist in namespace {{ trident_namespace }}"
  when: backend_check.resources | length == 0
  tags:
    - install
    - post-install

- name: Fail if backend is not in Bound phase
  ansible.builtin.fail:
    msg: "Trident backend {{ trident_backend_name }} is not bound. Current phase: {{ backend_check.resources[0].status.phase | default('Unknown') }}"
  when:
    - backend_check.resources | length > 0
    - backend_check.resources[0].status.phase | default('') != 'Bound'
  tags:
    - install
    - post-install

- name: Create Trident StorageClass
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'trident-storageclass.yaml.j2') | from_yaml }}"
  tags:
    - install
    - post-install

- name: Get all StorageClasses
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: StorageClass
  register: sc_list
  tags:
    - install
    - post-install

- name: Remove default annotation from non-trident StorageClasses
  kubernetes.core.k8s_json_patch:
    api_version: storage.k8s.io/v1
    kind: StorageClass
    name: "{{ item.metadata.name }}"
    patch:
      - op: remove
        path: /metadata/annotations/storageclass.kubernetes.io~1is-default-class
  loop: "{{ sc_list.resources }}"
  when:
    - item.metadata.name != trident_storage_class
    - item.metadata.annotations is defined
    - item.metadata.annotations['storageclass.kubernetes.io/is-default-class'] is defined
  tags:
    - install
    - post-install

# DELETE TASKS
- name: Delete Trident backend configuration
  kubernetes.core.k8s:
    api_version: trident.netapp.io/v1
    kind: TridentBackendConfig
    name: "{{ trident_backend_name }}"
    namespace: "{{ trident_namespace }}"
    state: absent
  tags:
    - delete

- name: Wait for Trident backend to be deleted
  kubernetes.core.k8s_info:
    api_version: trident.netapp.io/v1
    kind: TridentBackendConfig
    name: "{{ trident_backend_name }}"
    namespace: "{{ trident_namespace }}"
  register: backend_delete_check
  until: backend_delete_check.resources | length == 0
  retries: 12
  delay: 5
  tags:
    - delete

- name: Delete all TridentStorageClass resources
  kubernetes.core.k8s_info:
    api_version: trident.netapp.io/v1
    kind: TridentStorageClass
    namespace: "{{ trident_namespace }}"
  register: trident_sc_list
  tags:
    - delete

- name: Delete each TridentStorageClass
  kubernetes.core.k8s:
    api_version: trident.netapp.io/v1
    kind: TridentStorageClass
    name: "{{ item.metadata.name }}"
    namespace: "{{ trident_namespace }}"
    state: absent
  loop: "{{ trident_sc_list.resources }}"
  tags:
    - delete

- name: Delete all TridentNode resources
  kubernetes.core.k8s_info:
    api_version: trident.netapp.io/v1
    kind: TridentNode
    namespace: "{{ trident_namespace }}"
  register: trident_node_list
  tags:
    - delete

- name: Delete each TridentNode
  kubernetes.core.k8s:
    api_version: trident.netapp.io/v1
    kind: TridentNode
    name: "{{ item.metadata.name }}"
    namespace: "{{ trident_namespace }}"
    state: absent
  loop: "{{ trident_node_list.resources }}"
  tags:
    - delete

- name: Delete all TridentVersion resources
  kubernetes.core.k8s_info:
    api_version: trident.netapp.io/v1
    kind: TridentVersion
    namespace: "{{ trident_namespace }}"
  register: trident_version_list
  tags:
    - delete

- name: Delete each TridentVersion
  kubernetes.core.k8s:
    api_version: trident.netapp.io/v1
    kind: TridentVersion
    name: "{{ item.metadata.name }}"
    namespace: "{{ trident_namespace }}"
    state: absent
  loop: "{{ trident_version_list.resources }}"
  tags:
    - delete

- name: Wait for Trident custom resources to be deleted
  ansible.builtin.pause:
    seconds: 10
  tags:
    - delete

- name: Delete Trident ONTAP credentials secret
  kubernetes.core.k8s:
    api_version: v1
    kind: Secret
    name: "{{ trident_backend_name }}-secret"
    namespace: "{{ trident_namespace }}"
    state: absent
  tags:
    - delete

- name: Uninstall Trident operator
  kubernetes.core.helm:
    name: trident-operator
    release_namespace: "{{ trident_namespace }}"
    state: absent
  tags:
    - delete

- name: Delete Trident namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ trident_namespace }}"
    state: absent
  tags:
    - delete
