AWSTemplateFormatVersion: '2010-09-09'
Description: 'Enterprise RAG - EKS Cluster (Simple)'

Parameters:
  ClusterName:
    Type: String
    Default: erag
    Description: Name of the EKS cluster

  KubernetesVersion:
    Type: String
    Default: "1.33"
    AllowedValues: ["1.33"]

  NodeInstanceType:
    Type: String
    Default: r7i.24xlarge
    Description: "Recommended: r7i.24xlarge (96 vCPU, 768GB RAM) - matches terraform/aws config"
    AllowedValues:
      - r7i.24xlarge  # 96 vCPU, 2 NUMA nodes (48 vCPU/node)
      - r7i.48xlarge  # 192 vCPU, 2 NUMA nodes (96 vCPU/node)
      - r8i.24xlarge  # 96 vCPU, 2 NUMA nodes (48 vCPU/node)
      - r8i.32xlarge  # 128 vCPU, 2 NUMA nodes (64 vCPU/node)
      - r8i.48xlarge  # 192 vCPU, 2 NUMA nodes (96 vCPU/node)

  NodeVolumeSize:
    Type: Number
    Default: 300
    MinValue: 100

Resources:
  # VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-subnet-1
        - Key: kubernetes.io/role/elb
          Value: "1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-subnet-2
        - Key: kubernetes.io/role/elb
          Value: "1"

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref RouteTable

  Subnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref RouteTable

  # EKS Cluster
  ClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  Cluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt ClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref PublicSubnet1
          - !Ref PublicSubnet2
        EndpointPublicAccess: true
        EndpointPrivateAccess: true

  # Node Group
  NodeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  NodeLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref NodeVolumeSize
              VolumeType: gp3

  NodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn: Cluster
    Properties:
      ClusterName: !Ref ClusterName
      NodeRole: !GetAtt NodeRole.Arn
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      LaunchTemplate:
        Id: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      InstanceTypes:
        - !Ref NodeInstanceType
      ScalingConfig:
        DesiredSize: 1
        MinSize: 1
        MaxSize: 1

  # OIDC Provider for IRSA
  OIDCProvider:
    Type: AWS::IAM::OIDCProvider
    DependsOn: Cluster
    Properties:
      Url: !GetAtt Cluster.OpenIdConnectIssuerUrl
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 9e99a48a9960b14926bb7f3b02e22da2b0ab7280

  # EBS CSI Driver Role
  EBSCSIRole:
    Type: AWS::IAM::Role
    DependsOn: OIDCProvider
    Properties:
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": {"Federated": "arn:aws:iam::${AWS::AccountId}:oidc-provider/${OIDCIssuer}"},
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "${OIDCIssuer}:aud": "sts.amazonaws.com",
                  "${OIDCIssuer}:sub": "system:serviceaccount:kube-system:ebs-csi-controller-sa"
                }
              }
            }]
          }
        - OIDCIssuer: !Select [1, !Split ['https://', !GetAtt Cluster.OpenIdConnectIssuerUrl]]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy

  # EBS CSI Driver Addon
  EBSCSIAddon:
    Type: AWS::EKS::Addon
    DependsOn:
      - NodeGroup
      - EBSCSIRole
    Properties:
      ClusterName: !Ref ClusterName
      AddonName: aws-ebs-csi-driver
      ServiceAccountRoleArn: !GetAtt EBSCSIRole.Arn

Outputs:
  Step1ConfigureKubectl:
    Description: "Step 1: Configure kubectl"
    Value: !Sub "aws eks update-kubeconfig --region ${AWS::Region} --name ${ClusterName}"

  Step2SetDefaultStorageClass:
    Description: "Step 2: Set gp2 as default StorageClass"
    Value: "kubectl patch storageclass gp2 -p '{\"metadata\": {\"annotations\": {\"storageclass.kubernetes.io/is-default-class\": \"true\"}}}'"

  Step3InstallViaHelm:
    Description: "Step 3: Install Enterprise RAG via Helm"
    Value: "helm upgrade --install erag-installer oci://YOUR_REGISTRY/erag-installer-chart --version YOUR_TAG -n erag-system --create-namespace -f ./config/erag-values.yaml"

  Step4MonitorLogs:
    Description: "Step 4: Monitor installation"
    Value: "kubectl logs -n erag-system deploy/erag-installer -f"

  ClusterEndpoint:
    Value: !GetAtt Cluster.Endpoint
