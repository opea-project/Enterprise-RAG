---
dockerfile: "Dockerfile"
docker_context: "../../../../../"
dependencies:
  - pip-uv
  - apt
  - spacy-manual
  - manual
spacy-manual:
  packages:
    - zh_core_web_sm
    - en_core_web_sm
base-image:
  override:
    - python:3.11-slim-bookworm
apt:
  base-image-override: python:3.11-slim-bookworm
manual:
  packages:
# Added because of manual copy from UV image in Dockerfile
    - name: astral-sh/uv
      origin: github
      license: MIT
# openssl and libssl added due to manual security updates
    - name: openssl
      origin: apt
      license: Apache 2.0
    - name: libssl
      origin: apt
      license: Apache 2.0
