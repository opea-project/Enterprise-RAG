---
# Metadata Query Parsing - Polish Regex Patterns
# Copyright (C) 2024-2026 Intel Corporation
# SPDX-License-Identifier: Apache-2.0
#
# Patterns are processed by priority (higher first), first match wins per field.
# 'group'/'groups': capture group number(s). 'value': preset when no capture group.
# Polish patterns handle grammatical declensions (cases).
# Date patterns use a single 'date' category; DateNormalizer handles field disambiguation.
#
# Character class shortcuts used in comments:
#   PL = [a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]   NT = Uppercase-start name token
#   SW = stop-word lookahead             AT = any-case 2+ char token

version: "2.1"
language: "pl"

patterns:
  # ===========================================================================
  # AUTHOR PATTERNS (WZORCE AUTORГ“W)
  # ===========================================================================
  author:
    # Title implies authorship вҖ” no keyword needed (e.g. "prof. Kowalski")
    - name: "author_title_implicit"
      regex: '((?:dr\.?|prof\.?|mgr\.?|inЕј\.?)\s+[A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+(?:[\-\s][A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)*)'
      field: "author"
      operator: "=="
      group: 1
      priority: 15
      examples:
        - "prace prof. Tomasza ZieliЕ„skiego"

    # Team/dept + person OR (bidirectional, titled names allowed)
    - name: "author_team_person_or"
      regex: '(?:od|przez)\s+(?:((?:zespoЕӮu?|dziaЕӮu?)\s+[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,}(?:\s+[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,})*)\s+(?:lub|albo|i|oraz)\s+((?:dr\.?\s+|prof\.?\s+)?[A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+(?:[\-\s][A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)*)|((?:dr\.?\s+|prof\.?\s+)?[A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+(?:[\-\s][A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)*)\s+(?:lub|albo|i|oraz)\s+((?:zespoЕӮu?|dziaЕӮu?)\s+[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,}(?:\s+[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,})*))'
      field: "author"
      operator: "OR"
      groups: [1, 2, 3, 4]
      priority: 14
      flags: "IGNORECASE"
      examples:
        - "od zespoЕӮu technicznego lub Marka Lewandowskiego"

    # Filler words between keyword and names ("od liderГіw jak X lub Y")
    - name: "author_or_filler"
      regex: '(?:od|przez)\s+(?:[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+\s+){1,3}(?:jak\s+)?([A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]*(?:\s+[A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)?)\s+(?:lub|albo|i|oraz)\s+([A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]*(?:\s+[A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)?)'
      field: "author"
      operator: "OR"
      groups: [1, 2]
      priority: 13
      examples:
        - "od zewnДҷtrznych konsultantГіw jak Deloitte lub PwC"

    # Comma-separated list: "od A, B, lub C"
    - name: "author_or_list"
      regex: '(?:od|autorstwa|przez)\s+([A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]*(?:\s+[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,})?),\s+([A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]*(?:\s+[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,})?),?\s+(?:lub|albo|i|oraz)\s+([a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,}(?:\s+[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,})?)'
      field: "author"
      operator: "OR"
      groups: [1, 2, 3]
      priority: 13
      flags: "IGNORECASE"
      examples:
        - "od Agnieszki, MichaЕӮa, lub Ewy"

    # Two authors with OR (uppercase start required)
    - name: "author_or_explicit"
      regex: '(?:autorstwa|napisane?\s+przez|przez|od)\s+([A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+(?:[\-\s][A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)?)\s+(?:lub|albo|bД…dЕә|czy|i|oraz|&)\s+([A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+(?:[\-\s][A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)?)'
      field: "author"
      operator: "OR"
      groups: [1, 2]
      priority: 12
      examples:
        - "autorstwa Kowalskiego lub Nowaka"

    # Question: "Co napisaЕӮ X?"
    - name: "author_question"
      regex: '[Cc]o\s+(?:napisaЕӮ[a]?|stworzyЕӮ[a]?|zrobiЕӮ[a]?)\s+([A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+(?:[-\s][A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]?[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)*)'
      field: "author"
      operator: "=="
      group: 1
      priority: 11
      examples:
        - "Co napisaЕӮ Jan Kowalski"

    # Keyword + title captures "dr./prof." as part of name
    - name: "author_with_title"
      regex: '(?:autorstwa|napisane?\s+przez|przez|od\s+autora|od|autora?)\s+((?:dr\.?|prof\.?|mgr\.?|inЕј\.?)\s*[A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+(?:[-\s][A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]?[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)*)'
      field: "author"
      operator: "=="
      group: 1
      priority: 11
      examples:
        - "autorstwa prof. Jana Kowalskiego"

    # Author with explicit keyword (nominative + genitive forms)
    - name: "author_explicit"
      regex: '(?:autorstwa|napisane?\s+przez|stworzone?\s+przez|przygotowane?\s+przez|opracowane?\s+przez|przez|od\s+autora|od|autora?)\s+([A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+(?:[-\s][A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)*)'
      field: "author"
      operator: "=="
      group: 1
      priority: 10
      examples:
        - "autorstwa Jana Kowalskiego"

    # Exclusion: "nie autorstwa X", "oprГіcz Y"
    - name: "author_exclude"
      regex: '(?:nie\s+(?:autorstwa|przez|od)|oprГіcz|z\s+wyjД…tkiem|poza|lecz\s+nie|ale\s+nie\s+(?:od|przez))\s+(?:zespoЕӮu?\s+)?([A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+(?:\s+[A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]?[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)*)'
      field: "author"
      operator: "!="
      group: 1
      priority: 9
      examples:
        - "nie autorstwa Kowalskiego"

    # Department/team: "z dziaЕӮu X", "od zespoЕӮu Y"
    - name: "author_team"
      regex: '(?:pliki\s+)?(?:od|przez|z)\s+((?:zespoЕӮu?|dziaЕӮu?)\s+[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,}(?:\s+[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,})*)'
      field: "author"
      operator: "contains"
      group: 1
      priority: 9
      flags: "IGNORECASE"
      examples:
        - "z dziaЕӮu finansГіw"

    # "albo X albo Y" / "czy to X czy Y"
    - name: "author_either_or"
      regex: '(?:albo\s+)?([A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+(?:\s+[A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]?[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)?)\s+(?:albo|czy)\s+([A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+(?:\s+[A-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]?[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)?)'
      field: "author"
      operator: "OR"
      groups: [1, 2]
      priority: 8
      examples:
        - "albo Kowalski albo Nowak"

    # Uppercase acronym (HR, CFO). Stop-word boundary.
    - name: "author_acronym"
      regex: '(?:od|przez|autorstwa)\s+([A-Z]{2,})(?=\s+(?:utworzon|zaktualizowan|z\s+|w\s+|od\s+|do\s+)|[,;!?]|\s*$)'
      field: "author"
      operator: "=="
      group: 1
      priority: 8
      examples:
        - "od HR utworzone w 2024"

    # Lowercase role/dept OR with stop-word lookahead
    - name: "author_role_or"
      regex: '(?:od|przez|napisane?\s+przez)\s+([a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,}(?:\s+[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,})?)\s+(?:lub|albo|i|oraz)\s+([a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,}(?:\s+[a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕјA-ZД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»]{2,})?)(?=\s+(?:utworzon|zaktualizowan|zaimportowan|z\s+\d|w\s+\d|od\s+\d|z\s+ostatni|w\s+ostatni|z\s+[IQ])|[,;!?]|\s*$)'
      field: "author"
      operator: "OR"
      groups: [1, 2]
      priority: 7
      flags: "IGNORECASE"
      examples:
        - "od inЕјynierii lub zarzД…dzania produktem utworzone w 2024"

    # Single lowercase role with stop-word lookahead
    - name: "author_role"
      regex: '(?:od|przez|autorstwa)\s+([a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]{3,})(?=\s+(?:utworzon|zaktualizowan|zaimportowan|przesЕӮan|zmienion|z\s+|w\s+|od\s+|do\s+|na\s+|po\s+|przed\s+|miДҷdzy\s+)|[,;!?]|\s*$)'
      field: "author"
      operator: "=="
      group: 1
      priority: 6
      examples:
        - "od prawnikГіw zaimportowany w ostatnim tygodniu"

  # ===========================================================================
  # DATE PATTERNS (WZORCE DAT)
  # Default field: creation_date (DateNormalizer disambiguates)
  # ===========================================================================
  date:
    # Year range: "miДҷdzy 2020 a 2024", "z lat 2019-2023"
    - name: "date_range"
      regex: '(?:(?:miДҷdzy|pomiДҷdzy|od)\s+|z\s+lat\s+)?(\d{4})\s*(?:a|do|-|вҖ“|i)\s*(\d{4})'
      field: "creation_date"
      operator: "range"
      groups: [1, 2]
      priority: 10
      examples:
        - "miДҷdzy 2020 a 2024"

    # After/since: "po 2020", "nowsze niЕј 2021"
    - name: "date_after"
      regex: '(?:po|od|nie\s+starsze?\s+niЕј|nowsze?\s+niЕј)\s+(\d{4})'
      field: "creation_date"
      operator: ">="
      group: 1
      priority: 9

    # Before: "przed 2024", "starsze niЕј 2022"
    - name: "date_before"
      regex: '(?:przed|do|sprzed|starsze?\s+niЕј)\s+(\d{4})'
      field: "creation_date"
      operator: "<="
      group: 1
      priority: 9

    # Exact year: "w 2024", "z roku 2021"
    - name: "date_exact_year"
      regex: '(?:w\s+roku|z\s+roku|w|z)\s+(\d{4})'
      field: "creation_date"
      operator: "range"
      group: 1
      priority: 8

    # Quarter range вҖ” Q format and Roman numerals (merged)
    - name: "date_quarter_range"
      regex: '(?:[Qq]([1-4])\s*[-вҖ“]\s*[Qq]([1-4])|([IViv]{1,3})\s*[-вҖ“]\s*([IViv]{1,3})\s*(?:kwartaЕӮ[eua]?)?)\s+(\d{4})'
      field: "creation_date"
      operator: "quarter_range"
      groups: [1, 2, 3, 4, 5]
      priority: 10

    # Single quarter вҖ” Q format and Roman numerals (merged)
    - name: "date_quarter"
      regex: '(?:[Qq]([1-4])|([IViv]{1,3})\.?\s*kwartaЕӮ[eua]?)\s+(\d{4})'
      field: "creation_date"
      operator: "quarter"
      groups: [1, 2, 3]
      priority: 9

    # Ordinal quarter: "pierwszy kwartaЕӮ 2024"
    - name: "date_quarter_ordinal"
      regex: '(?:pierwszy|pierwszego|drugi|drugiego|trzeci|trzeciego|czwarty|czwartego)\s+kwartaЕӮ[eua]?\s+(\d{4})'
      field: "creation_date"
      operator: "quarter"
      group: 1
      priority: 9

    # Last quarter (all declensions)
    - name: "date_fuzzy_last_quarter"
      regex: '(?:ostatni(?:ego|emu|m)?|poprzedni(?:ego|emu|m)?)\s+kwartaЕӮ[eua]?'
      field: "creation_date"
      operator: "fuzzy_last_quarter"
      priority: 7

    # Recent (all declensions)
    - name: "date_fuzzy_recent"
      regex: '(?:ostatni(?:o|ch|e|mi)?|najnowsz(?:e|ych|ymi)?|ЕӣwieЕј(?:e|ych)?)\s*(?:dokument|plik|raport|dan)?[yeaГіi]?'
      field: "ingestion_date"
      operator: "fuzzy_recent"
      priority: 6

    # Today
    - name: "date_today"
      regex: '\b(?:dzisiaj|dziЕӣ|dzisiejsz[ey])\b'
      field: "ingestion_date"
      operator: "fuzzy_recent"
      value: "today"
      priority: 8

    # Yesterday
    - name: "date_yesterday"
      regex: '\bwczoraj\b'
      field: "ingestion_date"
      operator: "fuzzy_recent"
      value: "yesterday"
      priority: 8

    # Last year (all declensions)
    - name: "date_fuzzy_last_year"
      regex: '(?:zeszЕӮ(?:y|ego|ym|emu)|ubiegЕӮ(?:y|ego|ym|emu)|poprzedni(?:ego|emu|m)?)\s+rok[ua]?'
      field: "creation_date"
      operator: "fuzzy_last_year"
      priority: 7

    # This year
    - name: "date_fuzzy_this_year"
      regex: '(?:z\s+(?:tego|bieЕјД…cego)\s+roku|(?:ten|bieЕјД…c(?:y|ego|ym)|obecn(?:y|ego|ym)|tegoroczn(?:e|ych|ymi)?)\s*rok[ua]?)'
      field: "creation_date"
      operator: "fuzzy_this_year"
      priority: 7

    # Last N days/weeks/months (all declensions)
    - name: "date_fuzzy_last_n"
      regex: '(?:ostatni(?:ch|e|emi)?|z\s+ostatnich|w\s+ciД…gu\s+ostatnich)\s+(\d+)\s+(dni|dnia|tygodn(?:i|ie|iu|ia)|miesiД…c[eГіya]?|miesiДҷc[yi]?)'
      field: "ingestion_date"
      operator: "fuzzy_last_n"
      groups: [1, 2]
      priority: 7

    # Last week (singular, all declensions)
    - name: "date_fuzzy_last_week"
      regex: '(?:ostatni(?:ego|emu|m)?|poprzedni(?:ego|emu|m)?|zeszЕӮ(?:y|ego|ym)?|w\s+zeszЕӮym)\s+tygodn(?:iu|ia|iem)?'
      field: "ingestion_date"
      operator: "fuzzy_last_n"
      value: ["7", "dni"]
      priority: 8

    # Last month (singular, all declensions)
    - name: "date_fuzzy_last_month"
      regex: '(?:ostatni(?:ego|emu|m)?|poprzedni(?:ego|emu|m)?|zeszЕӮ(?:y|ego|ym)?|w\s+zeszЕӮym|w\s+ostatnim)\s+miesiД…c[eua]?'
      field: "ingestion_date"
      operator: "fuzzy_last_n"
      value: ["1", "miesiД…c"]
      priority: 8

    # Updated in YYYY вҶ’ last_update_date (all declensions)
    - name: "date_updated_year"
      regex: '(?:zaktualizowan[eya]|zmodyfikowan[eya]|zmienion[eya]|edytowan[eya]|poprawion[eya])\s+(?:w|w\s+roku)\s+(\d{4})'
      field: "last_update_date"
      operator: "range"
      group: 1
      priority: 9

    # Updated since вҶ’ last_update_date >=
    - name: "date_updated_since"
      regex: '(?:zaktualizowan[eya]|zmodyfikowan[eya]|zmienion[eya]|poprawion[eya])\s+(?:od|po)\s+(\w+\s+\d{4}|\d{4})'
      field: "last_update_date"
      operator: ">="
      group: 1
      priority: 9

    # Updated recently вҶ’ last_update_date
    - name: "date_updated_recently"
      regex: '(?:ostatnio\s+)?(?:zaktualizowan[eya]|zmodyfikowan[eya]|zmienion[eya]|edytowan[eya])\s*(?:ostatnio)?'
      field: "last_update_date"
      operator: "fuzzy_recent"
      priority: 7

    # Ingested in last N вҶ’ ingestion_date
    - name: "date_ingested_last_n"
      regex: '(?:zaimportowan[eya]|wgran[eya]|dodan[eya]|przesЕӮan[eya]|dodane)\s+(?:w\s+)?(?:ciД…gu\s+)?(?:ostatni(?:ch|m)?)\s+(\d+)\s*(dni|tygodn(?:i|iu)|miesiД…c[eya]?)'
      field: "ingestion_date"
      operator: "fuzzy_last_n"
      groups: [1, 2]
      priority: 8

    # Ingested recently вҶ’ ingestion_date
    - name: "date_ingested_recently"
      regex: '(?:ostatnio\s+)?(?:zaimportowan[eya]|wgran[eya]|dodan[eya]|przesЕӮan[eya])\s*(?:ostatnio)?'
      field: "ingestion_date"
      operator: "fuzzy_recent"
      priority: 7

    # Month range: "od stycznia do marca 2024"
    - name: "date_month_range"
      regex: '(?:od\s+)?(\w+)\s+(?:do|-|вҖ“)\s+(\w+)\s+(\d{4})'
      field: "creation_date"
      operator: "month_range"
      groups: [1, 2, 3]
      priority: 9

    # Updated last N вҶ’ last_update_date
    - name: "date_updated_last_n"
      regex: '(?:zaktualizowan[eya]|zmodyfikowan[eya]|zmienion[eya]|edytowan[eya])\s+(?:w\s+)?(?:ciД…gu\s+)?(?:ostatni(?:ch|m)?)\s+(\d+)\s*(dni|tygodn(?:i|iu)|miesiД…c[eya]?)'
      field: "last_update_date"
      operator: "fuzzy_last_n"
      groups: [1, 2]
      priority: 8

  # ===========================================================================
  # TITLE PATTERNS (WZORCE TYTUЕҒГ“W)
  # ===========================================================================
  title:
    # Title OR (ASCII + Unicode quotes)
    - name: "title_or"
      regex: "(?:zatytuЕӮowan[ey]|o\\s+tytule|o\\s+nazwie)\\s+[\"'\\u2018\\u2019\\u201c\\u201d\\u00ab\\u00bb\\u201e]([^\"'\\u2018\\u2019\\u201c\\u201d\\u00ab\\u00bb\\u201e]+)[\"'\\u2018\\u2019\\u201c\\u201d\\u00ab\\u00bb\\u201e]\\s+(?:lub|albo)\\s+[\"'\\u2018\\u2019\\u201c\\u201d\\u00ab\\u00bb\\u201e]([^\"'\\u2018\\u2019\\u201c\\u201d\\u00ab\\u00bb\\u201e]+)[\"'\\u2018\\u2019\\u201c\\u201d\\u00ab\\u00bb\\u201e]"
      field: "file_title"
      operator: "OR"
      groups: [1, 2]
      priority: 11

    # Quoted title with keyword (ASCII + Unicode quotes)
    - name: "title_quoted"
      regex: "(?:zatytuЕӮowan[ey]|o\\s+tytule|o\\s+nazwie|z\\s+tytuЕӮem|pod\\s+nazwД…)\\s+[\"'\\u2018\\u2019\\u201c\\u201d\\u00ab\\u00bb\\u201e]([^\"'\\u2018\\u2019\\u201c\\u201d\\u00ab\\u00bb\\u201e]+)[\"'\\u2018\\u2019\\u201c\\u201d\\u00ab\\u00bb\\u201e]"
      field: "file_title"
      operator: "=="
      group: 1
      priority: 10

    # Bare quoted title (ASCII + Unicode quotes, min 3 chars)
    - name: "title_quoted_bare"
      regex: "[\"'\\u2018\\u2019\\u201c\\u201d\\u00ab\\u00bb\\u201e]([^\"'\\u2018\\u2019\\u201c\\u201d\\u00ab\\u00bb\\u201e]{3,})[\"'\\u2018\\u2019\\u201c\\u201d\\u00ab\\u00bb\\u201e]"
      field: "file_title"
      operator: "contains"
      group: 1
      priority: 5

    # Filename with extension
    - name: "filename"
      regex: '([\w\-\.]+\.(?:pdf|docx|xlsx|pptx|doc|xls|ppt|txt|md|json|yaml|yml|csv|html|xml|log))'
      field: "file_title"
      operator: "=="
      group: 1
      priority: 10
      flags: "IGNORECASE"

