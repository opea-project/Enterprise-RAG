test_logs_parsing_capability:
  - en:
      files: [system_logs.txt]
      questions:
        - question: "How many WARNING logs came from the MonitoringService? These logs have the following string inside: '[MonitoringService] WARNING'"
          expected_any: ["3", "three"]
        - question: "At what time did the ERROR from InventoryService occur?"
          expected_any: ["10:01:47"]
        - question: "What was the last WARNING that comes from PaymentService? Provide the full log line. It should contain [PaymentService] string inside."
          expected_any: ["transaction tx1005 delayed due to network latency"]
    pl:
      files: [system_logs.txt]
      questions:
        - question: "Ile ostrzeżeń WARNING pochodziło z MonitoringService? Te logi zawierają ciąg znaków: '[MonitoringService] WARNING'"
          expected_any: ["3", "trzy"]
        - question: "O której godzinie wystąpił błąd ERROR z InventoryService?"
          expected_any: ["10:01:47"]
        - question: "Jakie było ostatnie ostrzeżenie WARNING z PaymentService? Podaj pełną linię logu. Powinna zawierać ciąg [PaymentService]."
          expected_any: ["transaction tx1005 delayed due to network latency"]
