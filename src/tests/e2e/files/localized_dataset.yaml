test_pptx_complex:
  - en:
      files: [test_dataprep.pptx]
      questions:
        - question: "List the capitals and locations of the regions: Kaczap, Ugrap, Magracz, Balgacz, Wielgacz."
          expected_any: ["Kaczap - Kruczak - Mountains", "Ugrap - Urkap - Valleys", "Magracz - Milkuk - Migmapanna Plateau", "Balgacz - Brukap", "Wielgacz - Wysokacz"]
        - question: "Provide the results from the pie chart on slide 4 and the bar chart on slide 5."
          expected_any: ["Sales - Wysokacz", "1st Qtr: 8.2", "2nd Qtr: 3.2", "3rd Qtr: 1.4", "4th Qtr: 1.2", "GDP", "Point 1: 100.0", "Point 2: 250.0", "Quality of Life", "Point 1: 10.0", "Point 2: 35.0"]
        - question: "What are the steps in SmartArt Process 1?"
          expected_any: ["Smart1", "Smart2", "Smart3"]
    pl:
      files: [test_dataprep.pptx]
      questions:
        - question: "Wymień stolice i położenie krain: Kaczap, Ugrap, Magracz, Balgacz, Wielgacz."
          expected_any: ["Kaczap: Kruczak - Góry", "Ugrap: Urkap - Doliny", "Magracz: Milkuk - Płaskowyż Migmapanna", "Balgacz: Brukap", "Wielgacz: Wysokacz"]
        - question: "Podaj wyniki z Wykresu kołowego na slajdzie nr 4 oraz słupkowego na slajdzie nr 5."
          expected_any: ["Sales - Wysokacz", "1st Qtr: 8.2", "2nd Qtr: 3.2", "3rd Qtr: 1.4", "4th Qtr: 1.2", "PKB", "Point 1: 100.0", "Point 2: 250.0", "Jakość życia", "Point 1: 10.0", "Point 2: 35.0"]
        - question: "Jakie są kroki w Smartart Process 1?"
          expected_any: ["Smart1", "Smart2", "Smart3"]
