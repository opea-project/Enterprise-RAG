# yamllint disable-line rule:line-length
test_txt:
  - en:
      files: [test_txt.txt]
      questions:
        - question: "How many cars commonly called MALUCH are registered in Gdansk?"
          expected_any: ["851"]
    pl:
      files: [test_txt.txt]
      questions:
        - question: "Ile samochodów potocznie nazywanych MALUCHAMI jest zarejestrowanych w Gdańsku?"
          expected_any: ["851"]
